<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB22 - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .gold-gradient { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .game-card:hover { border-color: #fbbf24; transform: translateY(-5px); transition: 0.3s; }
        iframe { width: 100%; height: 88vh; border: none; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [balance, setBalance] = useState(0);
            const [view, setView] = useState("home"); // home, perfil
            const [isLogin, setIsLogin] = useState(true);
            const [gameUrl, setGameUrl] = useState(null);
            const [showDep, setShowDep] = useState(false);
            const [pix, setPix] = useState(null);
            const [amt, setAmt] = useState("");
            
            const [valSaque, setValSaque] = useState("");
            const [pixSaque, setPixSaque] = useState("");

            // LISTA DE JOGOS REAIS (ESTILO 55BB)
            const games = [
                { id: 1, n: "Fortune Tiger", i: "https://vms-static.m-content.io/api/v1/vms/assets/v2/Fortune-Tiger_Logo.png", u: "https://m.pgsoft-games.com/126/index.html?ot=0642f534604e76092049d562f783267d&l=pt" },
                { id: 2, n: "Aviator", i: "https://upload.wikimedia.org/wikipedia/pt/0/0e/Aviator_Logo.png", u: "https://demo.spribe.io/games/aviator?currency=BRL&lang=pt" },
                { id: 3, n: "Fortune Ox", i: "https://img.bet.global/api/v1/vms/assets/v2/Fortune-Ox_Logo.png", u: "https://m.pgsoft-games.com/98/index.html?ot=0642f534604e76092049d562f783267d&l=pt" },
                { id: 4, n: "Mines", i: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8Xf2W6V6R5uM5_I-n1PAt-1Pz5m6XpW0j0A&s", u: "https://demo.spribe.io/games/mines?currency=BRL&lang=pt" },
                { id: 5, n: "Fortune Rabbit", i: "https://vms-static.m-content.io/api/v1/vms/assets/v2/Fortune-Rabbit_Logo.png", u: "https://m.pgsoft-games.com/1543462/index.html?l=pt" },
                { id: 6, n: "Dragon Hatch", i: "https://vms-static.m-content.io/api/v1/vms/assets/v2/Dragon-Hatch_Logo.png", u: "https://m.pgsoft-games.com/53/index.html?l=pt" },
                { id: 7, n: "Spaceman", i: "https://www.spaceman888.com/images/spaceman-logo.png", u: "https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?lang=pt&cur=BRL&gameSymbol=vs480spaceman" },
                { id: 8, n: "Gates of Olympus", i: "https://vms-static.m-content.io/api/v1/vms/assets/v2/Gates-of-Olympus_Logo.png", u: "https://demogamesfree.pragmaticplay.net/gs2c/openGame.do?lang=pt&cur=BRL&gameSymbol=vs20olympgate" },
                { id: 9, n: "Fortune Mouse", i: "https://vms-static.m-content.io/api/v1/vms/assets/v2/Fortune-Mouse_Logo.png", u: "https://m.pgsoft-games.com/68/index.html?l=pt" },
                { id: 10, n: "Roleta BR", i: "https://img.bet.global/api/v1/vms/assets/v2/Roulette_Logo.png", u: "https://babidogames.com/games/roulette" },
                { id: 11, n: "Double", i: "https://blaze.com/static/media/double.074e2d2a.png", u: "https://demo.spribe.io/games/plinko" },
                { id: 12, n: "Penalty Shootout", i: "https://img.bet.global/api/v1/vms/assets/v2/Penalty-Shoot-Out_Logo.png", u: "https://evoplay.games/game/penalty-shoot-out/demo/" }
            ];

            const handleAuth = async (e) => {
                e.preventDefault();
                const u = e.target.u.value;
                const p = e.target.p.value;
                const res = await fetch('/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: u, password: p, type: isLogin ? 'login' : 'cadastro' }) });
                const data = await res.json();
                if(data.error) return alert(data.error);
                setUser(data); setBalance(data.balance);
            };

            const gerarPix = async () => {
                if (amt < 5) return alert("Mínimo R$ 5");
                setPix("CARREGANDO");
                const res = await fetch('/pix', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ valor: amt, nome: user.username }) });
                const data = await res.json();
                setPix(data);
            };

            const sacar = async () => {
                if (valSaque < 30) return alert("Saque mínimo R$ 30");
                const res = await fetch('/sacar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ valor: valSaque, chavePix: pixSaque, username: user.username }) });
                const data = await res.json();
                if(data.success) { alert("Saque enviado!"); window.location.reload(); }
            };

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center p-4">
                        <div className="glass p-10 rounded-[40px] text-center w-full max-w-sm border border-white/10 shadow-2xl">
                            <h1 className="text-5xl font-black text-yellow-500 mb-8 italic uppercase tracking-tighter">ORB22</h1>
                            <form onSubmit={handleAuth} className="space-y-4">
                                <input name="u" type="text" placeholder="Usuário" required className="w-full p-4 bg-black border border-white/10 rounded-2xl outline-none focus:border-yellow-500" />
                                <input name="p" type="password" placeholder="Senha" required className="w-full p-4 bg-black border border-white/10 rounded-2xl outline-none focus:border-yellow-500" />
                                <button className="gold-gradient w-full py-4 rounded-2xl text-black font-black uppercase tracking-widest">{isLogin ? 'Entrar' : 'Cadastrar'}</button>
                            </form>
                            <button onClick={() => setIsLogin(!isLogin)} className="mt-6 text-[10px] text-gray-500 uppercase font-bold underline">
                                {isLogin ? 'Não tem conta? Registre-se' : 'Já tem conta? Login'}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <header className="h-20 glass px-6 flex items-center justify-between sticky top-0 z-50">
                        <div onClick={() => setView('perfil')} className="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-black font-black cursor-pointer italic text-xl shadow-lg">U</div>
                        <span onClick={() => {setView('home'); setGameUrl(null);}} className="text-yellow-500 font-black italic text-3xl cursor-pointer absolute left-1/2 -translate-x-1/2">ORB22</span>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[10px] text-gray-500 font-bold uppercase">Saldo</p>
                                <p className="font-black text-white italic text-lg leading-none">R$ {balance.toFixed(2)}</p>
                            </div>
                            <button onClick={() => setShowDep(true)} className="gold-gradient text-black font-black px-5 py-2 rounded-full text-[10px] uppercase">Depositar</button>
                        </div>
                    </header>

                    <main className="p-4 lg:p-10">
                        {gameUrl ? (
                            <div className="animate-in zoom-in">
                                <button onClick={() => setGameUrl(null)} className="mb-4 text-yellow-500 font-bold uppercase text-xs">← Voltar para a Início</button>
                                <iframe src={gameUrl}></iframe>
                            </div>
                        ) : view === 'perfil' ? (
                            <div className="max-w-xl mx-auto glass p-10 rounded-[40px] text-center animate-in fade-in">
                                <h2 className="text-4xl font-black italic mb-2 uppercase italic">{user.username}</h2>
                                <p className="text-gray-500 text-[10px] font-bold uppercase mb-8">Nível VIP 1</p>
                                
                                <div className="bg-white/5 p-8 rounded-[32px] text-left space-y-4 mb-8">
                                    <h3 className="text-yellow-500 font-black italic uppercase text-sm italic">Área de Saque</h3>
                                    <p className="text-[9px] text-gray-400">Mínimo R$ 30,00 • Somente via Chave Pix (CPF)</p>
                                    <input type="number" value={valSaque} onChange={e => setValSaque(e.target.value)} placeholder="Valor R$" className="w-full p-4 bg-black rounded-2xl outline-none" />
                                    <input type="text" value={pixSaque} onChange={e => setPixSaque(e.target.value)} placeholder="Seu CPF (Somente números)" className="w-full p-4 bg-black rounded-2xl outline-none" />
                                    <button onClick={sacar} className="w-full gold-gradient text-black font-black py-4 rounded-2xl text-xs uppercase">Solicitar Saque Agora</button>
                                </div>
                                <button onClick={() => window.location.reload()} className="text-red-500 font-bold uppercase text-xs underline tracking-widest">Sair da Conta</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 2xl:grid-cols-6 gap-6">
                                {games.map(g => (
                                    <div key={g.id} onClick={() => setGameUrl(g.u)} className="game-card glass rounded-[32px] p-2 cursor-pointer border border-white/5 group">
                                        <div className="aspect-square rounded-[24px] overflow-hidden bg-black/50 mb-3">
                                            <img src={g.i} className="w-full h-full object-cover group-hover:scale-110 transition-all duration-500" />
                                        </div>
                                        <div className="px-2 pb-2">
                                            <p className="font-black text-[10px] uppercase italic truncate tracking-tight">{g.n}</p>
                                            <div className="flex justify-between items-center mt-1">
                                                <span className="text-yellow-500 text-[8px] font-bold">JOGAR</span>
                                                <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showDep && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[60]">
                            <div className="glass p-8 rounded-[40px] w-full max-w-sm text-center relative">
                                <button onClick={() => {setShowDep(false); setPix(null);}} className="absolute top-6 right-6 text-gray-500">✕</button>
                                <h2 className="text-xl font-black mb-6 italic uppercase tracking-tighter">Depositar via Pix</h2>
                                {!pix ? (
                                    <>
                                        <input type="number" value={amt} onChange={e => setAmt(e.target.value)} placeholder="Valor R$" className="w-full p-4 bg-black border border-white/10 rounded-2xl text-2xl font-bold mb-4 outline-none text-center" />
                                        <button onClick={gerarPix} className="gold-gradient w-full py-4 rounded-2xl text-black font-black uppercase">Gerar Pix</button>
                                    </>
                                ) : (
                                    <div className="space-y-6">
                                        {pix === "CARREGANDO" ? <p className="animate-pulse font-bold">Acessando Banco...</p> : (
                                            <>
                                                <div className="bg-white p-2 inline-block rounded-[24px]">
                                                    <img src={`data:image/png;base64,${pix.qrcodeBase64}`} className="w-48 h-48" />
                                                </div>
                                                <p className="text-[8px] break-all text-gray-500 bg-black p-3 rounded-xl border border-white/5">{pix.copyPaste}</p>
                                                <p className="text-yellow-500 font-bold text-xs animate-pulse italic uppercase">Pague e o saldo entrará na hora</p>
                                            </>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
