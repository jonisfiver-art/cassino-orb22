<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB22 - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .gold-gradient { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [balance, setBalance] = useState(0); 
            const [view, setView] = useState("home");
            const [showDep, setShowDep] = useState(false);
            const [amt, setAmt] = useState("");
            const [pixData, setPixData] = useState(null);

            const games = [
                { id: 1, name: "Tigre da Fortuna", img: "https://vms-static.m-content.io/api/v1/vms/assets/v2/Fortune-Tiger_Logo.png" },
                { id: 2, name: "Aviador", img: "https://upload.wikimedia.org/wikipedia/pt/0/0e/Aviator_Logo.png" },
                { id: 3, name: "Boi da Fortuna", img: "https://img.bet.global/api/v1/vms/assets/v2/Fortune-Ox_Logo.png" }
            ];

            // FUNÇÃO DE LOGIN/CADASTRO REAL
            const handleLogin = async () => {
                const nome = document.getElementById('u').value;
                if(!nome) return alert("Digite um nome!");
                try {
                    const res = await fetch('/auth', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username: nome })
                    });
                    const data = await res.json();
                    if(data.error) throw new Error();
                    setUser(data);
                    setBalance(data.balance);
                } catch (e) { alert("Erro ao conectar com o servidor!"); }
            };

            const handleGerarPix = async () => {
                if (amt < 5) return alert("Mínimo R$ 5,00");
                setPixData("CARREGANDO...");
                try {
                    const res = await fetch('/pix', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ valor: amt, nome: user.username })
                    });
                    const data = await res.json();
                    setPixData(data);
                } catch (e) { alert("Erro no Pix"); setPixData(null); }
            };

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-black p-4">
                        <div className="glass p-10 rounded-[40px] text-center w-full max-w-sm border border-white/10">
                            <h1 className="text-6xl font-black text-yellow-500 mb-8 italic italic tracking-tighter">ORB22</h1>
                            <input id="u" type="text" placeholder="Nome de Usuário" className="w-full p-4 bg-black/50 border border-white/10 rounded-2xl mb-4 outline-none focus:border-yellow-500 text-white" />
                            <button onClick={handleLogin} className="gold-gradient w-full py-4 rounded-2xl text-black font-black uppercase tracking-widest hover:scale-105 transition-all">Entrar Agora</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <header className="h-20 glass px-6 flex items-center justify-between sticky top-0 z-50">
                        <span onClick={() => setView('home')} className="text-yellow-500 font-black italic text-3xl cursor-pointer">ORB22</span>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[10px] text-gray-500 font-bold uppercase">Saldo</p>
                                <p className="font-black text-white italic">R$ {balance.toFixed(2)}</p>
                            </div>
                            <button onClick={() => setShowDep(true)} className="gold-gradient text-black font-black px-6 py-2 rounded-full text-xs uppercase">Depositar</button>
                        </div>
                    </header>

                    <main className="p-6">
                        {view === 'home' ? (
                            <div className="grid grid-cols-2 lg:grid-cols-3 gap-6">
                                {games.map(g => (
                                    <div key={g.id} className="glass rounded-3xl p-3 border border-white/5 group">
                                        <div className="aspect-square bg-black rounded-2xl mb-4 overflow-hidden">
                                            <img src={g.img} className="w-full h-full object-cover group-hover:scale-110 transition-all" />
                                        </div>
                                        <p className="font-bold uppercase text-xs text-center">{g.name}</p>
                                        <button className="w-full mt-3 py-2 bg-white/5 rounded-xl text-[10px] font-bold">JOGAR AGORA</button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="max-w-md mx-auto glass p-10 rounded-[40px] text-center border border-white/10">
                                <div className="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center text-black font-black text-3xl mx-auto mb-4 italic">U</div>
                                <h2 className="text-2xl font-black italic mb-2 uppercase">{user.username}</h2>
                                <p className="text-gray-500 mb-8">ID do Jogador: #88291</p>
                                <button onClick={() => window.location.reload()} className="text-red-500 font-bold underline italic uppercase text-sm">Sair da Conta</button>
                            </div>
                        )}
                        
                        <div className="mt-10 text-center">
                             <button onClick={() => setView(view === 'home' ? 'profile' : 'home')} className="text-gray-500 font-bold uppercase text-[10px] tracking-widest underline">
                                {view === 'home' ? 'Ver Meu Perfil' : 'Voltar para Início'}
                             </button>
                        </div>
                    </main>

                    {showDep && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[60]">
                            <div className="glass p-8 rounded-[40px] w-full max-w-sm text-center relative border border-white/10">
                                <button onClick={() => {setShowDep(false); setPixData(null);}} className="absolute top-6 right-6 text-gray-500">✕</button>
                                <h2 className="text-xl font-black mb-6 italic uppercase tracking-tighter">Depositar via Pix</h2>
                                {!pixData ? (
                                    <>
                                        <input type="number" value={amt} onChange={e => setAmt(e.target.value)} placeholder="R$ 0,00" className="w-full p-4 bg-black border border-white/10 rounded-2xl text-2xl font-bold mb-4 outline-none text-center" />
                                        <button onClick={handleGerarPix} className="gold-gradient w-full py-4 rounded-2xl text-black font-black uppercase">Gerar Pix</button>
                                    </>
                                ) : (
                                    <div className="space-y-4">
                                        <div className="bg-white p-2 inline-block rounded-xl">
                                            <img src={`data:image/png;base64,${pixData.qrcodeBase64}`} className="w-48 h-48" />
                                        </div>
                                        <p className="text-[9px] break-all text-gray-500 bg-black p-2 rounded">{pixData.copyPaste}</p>
                                        <p className="text-yellow-500 font-bold text-xs animate-pulse italic uppercase tracking-widest">Aguardando Pagamento...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
